<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="bg-white shadow flex flex-col md:flex-row md:justify-between md:items-center gap-3 px-5 md:px-8 py-4">

<div class="flex items-center gap-2">
<img class="w-7" src="assets/github-logo.png" alt="">
<h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-2">

<input
id="searchInput"
placeholder="Search issue..."
class="border px-3 py-2 rounded text-sm w-full md:w-auto">

<button
onclick="searchIssue()"
class="bg-purple-600 text-white px-4 py-2 rounded text-sm">
Search
</button>

</div>

</div>
<!-- CONTENT -->

<div class="max-w-6xl mx-auto mt-6 md:mt-8 bg-white p-4 md:p-6 rounded-lg shadow">


<!-- TABS -->

<div class="flex flex-wrap gap-3 mb-6">

<button
onclick="showAll(this)"
class="tabBtn px-4 py-2 rounded bg-purple-600 text-white text-sm">
All
</button>

<button
onclick="showOpen(this)"
class="tabBtn px-4 py-2 rounded bg-gray-200 text-sm">
Open
</button>

<button
onclick="showClosed(this)"
class="tabBtn px-4 py-2 rounded bg-gray-200 text-sm">
Closed
</button>

</div>


<!-- HEADER -->

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6">

<div class="flex items-center gap-3">

<div class=" text-purple-600 px-3 py-1 rounded-full text-sm flex items-center gap-1">
<div><img class="bg-purple-200 rounded-full" src="assets/Aperture.png" alt=""></div>
<span id="issueCount" class="font-semibold">0</span>
Issues
</div>

<p class="text-xs text-gray-500">
Showing issues across your project
</p>

</div>

<div class="flex gap-4 text-sm">

<span class="text-green-600 flex gap-2 items-center">
<img class="w-4" src="assets/Open-Status.png"> Open
</span>

<span class="text-purple-600 flex gap-2 items-center">
<img class="w-4" src="assets/Closed- Status .png"> Closed
</span>

</div>

</div>
