<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker | Home</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="bg-white shadow flex flex-col md:flex-row md:justify-between md:items-center gap-3 px-5 md:px-8 py-4">

<div class="flex items-center gap-2">
<img class="w-7" src="assets/github-logo.png" alt="">
<h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-2">

<input
id="searchInput"
placeholder="Search issue..."
class="border px-3 py-2 rounded text-sm w-full md:w-auto">

<button
onclick="searchIssue()"
class="bg-purple-600 text-white px-4 py-2 rounded text-sm">
Search
</button>

</div>

</div>
<!-- CONTENT -->

<div class="max-w-6xl mx-auto mt-6 md:mt-8 bg-white p-4 md:p-6 rounded-lg shadow">


<!-- TABS -->

<div class="flex flex-wrap gap-3 mb-6">

<button
onclick="showAll(this)"
class="tabBtn px-4 py-2 rounded bg-purple-600 text-white text-sm">
All
</button>

<button
onclick="showOpen(this)"
class="tabBtn px-4 py-2 rounded bg-gray-200 text-sm">
Open
</button>

<button
onclick="showClosed(this)"
class="tabBtn px-4 py-2 rounded bg-gray-200 text-sm">
Closed
</button>

</div>


<!-- HEADER -->

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6">

<div class="flex items-center gap-3">

<div class=" text-purple-600 px-3 py-1 rounded-full text-sm flex items-center gap-1">
<div><img class="bg-purple-200 rounded-full" src="assets/Aperture.png" alt=""></div>
<span id="issueCount" class="font-semibold">0</span>
Issues
</div>

<p class="text-xs text-gray-500">
Showing issues across your project
</p>

</div>

<div class="flex gap-4 text-sm">

<span class="text-green-600 flex gap-2 items-center">
<img class="w-4" src="assets/Open-Status.png"> Open
</span>

<span class="text-purple-600 flex gap-2 items-center">
<img class="w-4" src="assets/Closed- Status .png"> Closed
</span>

</div>

</div>
<!-- ISSUE GRID -->

<div
id="issuesContainer"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">

</div>


</div>


<!-- MODAL -->

<div
id="issueModal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50 px-4">

<div class="bg-white w-full max-w-lg p-6 rounded-lg shadow-lg relative">

<button
onclick="closeModal()"
class="absolute right-3 top-2 text-xl text-gray-500">
×
</button>

<h2 id="modalTitle" class="text-lg font-semibold mb-2"></h2>

<p id="modalDesc" class="text-gray-600 text-sm mb-4"></p>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">

<p><b>Status:</b> <span id="modalStatus"></span></p>

<p><b>Author:</b> <span id="modalAuthor"></span></p>

<p><b>Priority:</b> <span id="modalPriority"></span></p>

<p><b>Label:</b> <span id="modalLabel"></span></p>

<p><b>Created:</b> <span id="modalDate"></span></p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
