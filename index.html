<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issue Tracker | Login</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-80">

<img class="mx-auto py-3" src="assets/github-logo.png" alt="">  

<h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>

<p class="text-center text-gray-500 mb-6">Login to continue</p>

<input id="username"
placeholder="Username"
class="w-full border p-2 rounded mb-3">

<input id="password"
type="password"
placeholder="Password"
class="w-full border p-2 rounded mb-3">

<button id="loginBtn"
class="w-full bg-blue-500 text-white p-2 rounded">
Sign In
</button>

<p class="text-center text-sm text-gray-400 mt-4">
Demo: admin / admin123
</p>

</div>

<script>

document.getElementById("loginBtn").addEventListener("click",function(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

if(user==="admin" && pass==="admin123"){
window.location.href="main.html"
}else{
alert("Wrong Credentials")
}

})

</script>

</body>
</html>
